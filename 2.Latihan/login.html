<form action="/login-handler" method="POST">
    <fieldset style="width: 400px; padding: 20px; font-family: serif;">
        <legend>Login</legend>
        
        <p>
            <label for="user">Username:</label>
            <input type="text" id="user" name="username" value="Christiano Ronaldo">
        </p>
        
        <p>
            <label for="pass">Password:</label>
            <input type="password" id="pass" name="password" value="password123">
        </p>
        
        <p>
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
        </p>
        
        <button type="submit">Login</button>
    </fieldset>
</form>
